packages:
  # Shell utilities
  - name: wget
  - name: curl
  - name: less
  - name: tree
  - name: git
    config: .gitconfig
  
  # Window manager
  - name: base-devel
  - name: hyprland
    check: 
      cmd: hydectl 
    setup:
      cmd: git clone --depth 1 https://github.com/HyDE-Project/HyDE ~/HyDE || cd ~/HyDE/Scripts || ./install.sh
    config: .config/hypr/userprefs.conf 
  
  # Shell setup
  - name: kitty
    config: .config/kitty/kitty.conf .config/kitty/hyde.conf
  - name: zsh
    setup: 
      cmd: chsh -s /usr/bin/zsh && sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)"
    config: .zshrc .zshenv .config/zsh/completions .config/zsh/conf.d .config/zsh/functions .config/zsh/plugin.zsh .config/zsh/prompt.zsh .config/zsh/user.zsh .config/zsh/.zshenv .config/zsh/.zshrc
  - name: starship
    config: .config/starship 
  - name: eza                   # Alternative ls
  
  # Shell applications 
  - name: man
  - name: tmux 
  - name: vim
    config: .config/vim/hyde.vim .config/vim/vimrc
  - name: yazi                  # Terminal file explorer 
  - name: fzf
  - name: btop
  
  # Development
  - name: github-cli 
  - name: python-poetry
  - name: docker
  - name: docker-compose

  # Pentesting
  - name: nmap
  - name: networkmanager-openvpn
  - name: insomnia
  - name: ffuf 

  # Drivers
  - name: ntfs-3g
  - name: networkmanager

  # Applications
  - name: firefox
  - name: telegram-desktop
  - name: steam
  - name: obs-studio
  - name: discord
  - name: yt-dlp
  - name: audacity
  - name: qpwgraph 
