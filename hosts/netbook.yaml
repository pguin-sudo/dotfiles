packages:
  # Terminal and shell
  - name: git
    config: .gitconfig
  - name: less
  - name: man
  - name: helix
    config: .config/helix/*
  - name: fish
    config: .config/fish/*
    setup:
      cmd: chsh -s /usr/bin/fish
    check:
      cmd: echo $SHELL
      result: /usr/bin/fish
  - name: eza
  - name: starship
  - name: fisher
  - name: tmux
  - name: tree

  # Window manager
  - name: river
    config: .config/river/*

  # Dev
  - name: github-cli

  # Programs
  - name: telegram-desktop
