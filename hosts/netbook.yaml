packages:
  # Shell utilities
  - name: wget
  - name: curl
  - name: less
  - name: tree
  - name: git
    config: .gitconfig

  # Window manager
  - name: ly
  - name: river 
    config: .config/river
  - name: seatd
  - name: rofi-wayland

  # Shell setup
  - name: kitty
    config: .config/kitty/kitty.conf .config/kitty/hyde.conf
  - name: zsh
    setup: sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)"
    config: .zshrc .zshenv .config/zsh 
  - name: starship
    config: .config/starship 
  - name: eza                   # Alternative ls
  
  # Shell applications 
  - name: man
  - name: tmux 
  - name: vim
    config: .config/vim/hyde.vim .config/vim/vimrc
  - name: yazi                  # Terminal file explorer 
  - name: fzf
  - name: btop
  
  # Development
  - name: github-cli 
  - name: python-poetry
  
  # Pentesting
  - name: nmap
  - name: networkmanager-openvpn
  - name: insomnia
  - name: ffuf

  # Drivers
  - name: networkmanager

  # Applications
  - name: firefox
  - name: telegram-desktop
  
