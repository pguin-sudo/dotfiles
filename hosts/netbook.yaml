packages:
  # Terminal and shell utilities
  - name: git
    config: .gitconfig
  - name: less
  - name: man
  - name: helix
    config: .config/helix/*
  - name: fish
    config: .config/fish/*
    setup:
      cmd: chsh -s /usr/bin/fish
    check:
      cmd: echo $SHELL
      result: /usr/bin/fish
  - name: eza
  - name: starship
    config: .config/starship.toml
  - name: fisher
  - name: tmux
  - name: tree
  - name: btop

  # Window manager
  - name: river 
    config: .config/river/*
  - name: seatd
  - name: rofi-wayland

  # Tools
  - name: networkmanager

  # Development tools
  - name: github-cli
  - name: clang
  - name: python-lsp-server
  - name: dprint

  # Pentesting
  - name: nmap
  - name: networkmanager-openvpn

  # Applications
  - name: kitty ttf-jetbrains-mono-nerd
    config: .config/kitty/*
  - name: firefox
  - name: telegram-desktop
